version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: votelens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: votelens
      POSTGRES_PASSWORD: votelens_dev
      POSTGRES_DB: votelens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votelens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: votelens_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: votelens_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "votelens_meili_dev_key"
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meilisearch_data: